<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chun-An (Lucas) King | Portfolio</title>
    <meta name="description" content="Portfolio of Chun-An (Lucas) King - AI Researcher, Data Scientist, and Quantitative Finance professional.">

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ========== NAVBAR ========== -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-brand" id="nav-brand"></div>
        <div class="navbar-tabs" role="tablist" aria-label="Portfolio sections">
            <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-about" data-tab="about">About</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-experience" data-tab="experience">Experience</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-education" data-tab="education">Education</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-projects" data-tab="projects">Projects</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-competitions" data-tab="competitions">Competitions</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-certificates" data-tab="certificates">Certificates</button>
        </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">

        <!-- About Panel -->
        <section class="tab-panel active visible" id="panel-about" role="tabpanel" aria-labelledby="tab-about">
            <div class="about-container" id="about-content"></div>
        </section>

        <!-- Experience Panel -->
        <section class="tab-panel" id="panel-experience" role="tabpanel" aria-labelledby="tab-experience">
            <h2 class="section-heading">Experience</h2>
            <div class="experience-list" id="experience-content"></div>
        </section>

        <!-- Education Panel -->
        <section class="tab-panel" id="panel-education" role="tabpanel" aria-labelledby="tab-education">
            <h2 class="section-heading">Education</h2>
            <div class="education-list" id="education-content"></div>
        </section>

        <!-- Projects Panel -->
        <section class="tab-panel" id="panel-projects" role="tabpanel" aria-labelledby="tab-projects">
            <h2 class="section-heading">Projects</h2>
            <div class="projects-accordion" id="projects-content"></div>
        </section>

        <!-- Competitions Panel -->
        <section class="tab-panel" id="panel-competitions" role="tabpanel" aria-labelledby="tab-competitions">
            <h2 class="section-heading">Competitions</h2>
            <div class="competitions-list" id="competitions-content"></div>
        </section>

        <!-- Certificates Panel -->
        <section class="tab-panel" id="panel-certificates" role="tabpanel" aria-labelledby="tab-certificates">
            <h2 class="section-heading">Certificates</h2>
            <div class="certificates-list" id="certificates-content"></div>
        </section>

    </main>

    <!-- ========== DATA ========== -->
    <script src="data.js"></script>

    <!-- ========== APP LOGIC ========== -->
    <script>
    (function () {
        'use strict';

        var data = SITE_DATA;

        // --- Helpers ---
        function esc(str) {
            var el = document.createElement('span');
            el.textContent = str;
            return el.innerHTML;
        }

        function buildList(items) {
            if (!items || items.length === 0) return '';
            var html = '<ul class="card-description">';
            for (var i = 0; i < items.length; i++) {
                html += '<li>' + esc(items[i]) + '</li>';
            }
            html += '</ul>';
            return html;
        }

        function githubLink(url) {
            if (!url) return '';
            return '<a class="card-link" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' +
                   '<i class="fa-brands fa-github"></i> View on GitHub</a>';
        }

        // --- Render Navbar Brand ---
        document.getElementById('nav-brand').textContent = data.personal.name;

        // --- Render About ---
        (function renderAbout() {
            var p = data.personal;
            var html = '';
            html += '<h1 class="about-name">' + esc(p.name) + '</h1>';
            html += '<p class="about-title">' + esc(p.title) + '</p>';
            var bioArr = Array.isArray(p.bio) ? p.bio : [p.bio];
            for (var b = 0; b < bioArr.length; b++) {
                html += '<p class="about-bio">' + esc(bioArr[b]) + '</p>';
            }
            html += '<div class="social-links">';
            if (p.social.github) {
                html += '<a class="social-btn" href="' + esc(p.social.github) + '" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile" title="GitHub">' +
                        '<i class="fa-brands fa-github"></i></a>';
            }
            if (p.social.linkedin) {
                html += '<a class="social-btn" href="' + esc(p.social.linkedin) + '" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile" title="LinkedIn">' +
                        '<i class="fa-brands fa-linkedin-in"></i></a>';
            }
            if (p.social.email) {
                html += '<a class="social-btn" href="mailto:' + esc(p.social.email) + '" aria-label="Send email" title="Email">' +
                        '<i class="fa-solid fa-envelope"></i></a>';
            }
            html += '</div>';
            document.getElementById('about-content').innerHTML = html;
        })();

        // --- Render Experience ---
        (function renderExperience() {
            var items = data.experience;
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                html += '<article class="card">';
                html += '<h3 class="card-title">' + esc(item.title) + '</h3>';
                html += '<span class="card-date">' + esc(item.date) + '</span>';
                html += buildList(item.description);
                html += githubLink(item.link);
                html += '</article>';
            }
            document.getElementById('experience-content').innerHTML = html;
        })();

        // --- Render Education ---
        (function renderEducation() {
            var items = data.education;
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                html += '<article class="card">';
                html += '<h3 class="card-title">' + esc(item.title) + '</h3>';
                html += '<p class="card-subtitle">' + esc(item.degree) + '</p>';
                html += '<span class="card-date">' + esc(item.date) + '</span>';
                html += buildList(item.description);
                if (item.coursework) {
                    html += '<p class="card-coursework"><strong>Coursework:</strong> ' + esc(item.coursework) + '</p>';
                }
                html += '</article>';
            }
            document.getElementById('education-content').innerHTML = html;
        })();

        // --- Render Projects (Accordion) ---
        (function renderProjects() {
            var items = data.projects;
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var hasBody = (item.description && item.description.length > 0) || item.link;
                html += '<div class="accordion-item">';
                html += '<div class="accordion-header" role="button" tabindex="0" aria-expanded="false">';
                html += '<div class="accordion-header-left">';
                html += '<div class="accordion-title">' + esc(item.title) + '</div>';
                html += '</div>';
                html += '<span class="accordion-date">' + esc(item.date) + '</span>';
                if (hasBody) {
                    html += '<div class="accordion-chevron"><i class="fa-solid fa-chevron-down"></i></div>';
                }
                html += '</div>';
                if (hasBody) {
                    html += '<div class="accordion-body"><div class="accordion-content">';
                    html += buildList(item.description);
                    html += githubLink(item.link);
                    html += '</div></div>';
                }
                html += '</div>';
            }
            document.getElementById('projects-content').innerHTML = html;
        })();

        // --- Render Competitions ---
        (function renderCompetitions() {
            var items = data.competitions;
            var html = '';
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                html += '<article class="card">';
                html += '<h3 class="card-title">' + esc(item.title) + '</h3>';
                if (item.subtitle) {
                    html += '<p class="card-subtitle">' + esc(item.subtitle) + '</p>';
                }
                html += '<span class="card-date">' + esc(item.date) + '</span>';
                html += buildList(item.description);
                html += '</article>';
            }
            document.getElementById('competitions-content').innerHTML = html;
        })();

        // --- Render Certificates ---
        (function renderCertificates() {
            var certs = data.certificates;
            var html = '';

            // Certificate categories (one item per line)
            html += '<div class="cert-list-section">';
            for (var c = 0; c < certs.categories.length; c++) {
                var cat = certs.categories[c];
                if (cat.items.length === 0) continue;
                html += '<div class="cert-category">';
                html += '<h4 class="cert-category-title">' + esc(cat.name) + '</h4>';
                html += '<ul class="cert-category-list">';
                for (var i = 0; i < cat.items.length; i++) {
                    html += '<li>' + esc(cat.items[i]) + '</li>';
                }
                html += '</ul>';
                html += '</div>';
            }
            html += '</div>';

            // Certificate images gallery
            html += '<div class="cert-images-section">';
            html += '<div class="cert-images-gallery">';
            for (var i = 0; i < certs.images.length; i++) {
                html += '<img class="cert-image" src="' + esc(certs.images[i]) + '" alt="Certificate ' + (i + 1) + '" loading="lazy">';
            }
            html += '</div>';
            html += '<div class="cert-actions-inline">';
            html += '<a class="card-link" href="' + esc(certs.file) + '" target="_blank" rel="noopener noreferrer">';
            html += '<i class="fa-solid fa-file-pdf"></i> View PDF</a>';
            html += '<a class="card-link" href="' + esc(certs.file) + '" download>';
            html += '<i class="fa-solid fa-download"></i> Download PDF</a>';
            html += '</div>';
            html += '</div>';

            document.getElementById('certificates-content').innerHTML = html;
        })();

        // --- Tab Switching ---
        var tabBtns = document.querySelectorAll('.tab-btn');
        var tabPanels = document.querySelectorAll('.tab-panel');

        function switchTab(targetTab) {
            // Deactivate all tabs
            for (var i = 0; i < tabBtns.length; i++) {
                tabBtns[i].classList.remove('active');
                tabBtns[i].setAttribute('aria-selected', 'false');
            }

            // Hide all panels
            for (var j = 0; j < tabPanels.length; j++) {
                tabPanels[j].classList.remove('visible');
            }

            // After fade-out transition, swap display
            setTimeout(function () {
                for (var k = 0; k < tabPanels.length; k++) {
                    tabPanels[k].classList.remove('active');
                }

                // Activate target
                var activeBtn = document.querySelector('[data-tab="' + targetTab + '"]');
                var activePanel = document.getElementById('panel-' + targetTab);

                if (activeBtn && activePanel) {
                    activeBtn.classList.add('active');
                    activeBtn.setAttribute('aria-selected', 'true');
                    activePanel.classList.add('active');

                    // Scroll main content to top
                    document.querySelector('.main-content').scrollTop = 0;

                    // Trigger fade-in on next frame
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            activePanel.classList.add('visible');
                        });
                    });
                }
            }, 150);
        }

        for (var i = 0; i < tabBtns.length; i++) {
            tabBtns[i].addEventListener('click', function () {
                var tab = this.getAttribute('data-tab');
                if (!this.classList.contains('active')) {
                    switchTab(tab);
                }
            });
        }

        // --- Accordion Logic (Projects) ---
        var accordion = document.querySelector('.projects-accordion');
        if (accordion) {
            accordion.addEventListener('click', function (e) {
                var header = e.target.closest('.accordion-header');
                if (!header) return;

                var item = header.parentElement;
                var body = item.querySelector('.accordion-body');
                if (!body) return;

                var isExpanded = item.classList.contains('expanded');

                // Close other expanded items
                var openItems = accordion.querySelectorAll('.accordion-item.expanded');
                for (var j = 0; j < openItems.length; j++) {
                    if (openItems[j] !== item) {
                        openItems[j].classList.remove('expanded');
                        var openBody = openItems[j].querySelector('.accordion-body');
                        if (openBody) openBody.style.maxHeight = null;
                        var openHeader = openItems[j].querySelector('.accordion-header');
                        if (openHeader) openHeader.setAttribute('aria-expanded', 'false');
                    }
                }

                // Toggle current item
                if (isExpanded) {
                    item.classList.remove('expanded');
                    body.style.maxHeight = null;
                    header.setAttribute('aria-expanded', 'false');
                } else {
                    item.classList.add('expanded');
                    body.style.maxHeight = body.scrollHeight + 'px';
                    header.setAttribute('aria-expanded', 'true');
                }
            });

            // Keyboard support
            accordion.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    var header = e.target.closest('.accordion-header');
                    if (header) {
                        e.preventDefault();
                        header.click();
                    }
                }
            });
        }

        // --- Keyboard Navigation for Tabs ---
        var tabContainer = document.querySelector('.navbar-tabs');
        tabContainer.addEventListener('keydown', function (e) {
            var currentIndex = -1;
            for (var i = 0; i < tabBtns.length; i++) {
                if (tabBtns[i] === document.activeElement) {
                    currentIndex = i;
                    break;
                }
            }
            if (currentIndex === -1) return;

            var newIndex = currentIndex;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                newIndex = (currentIndex + 1) % tabBtns.length;
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                newIndex = (currentIndex - 1 + tabBtns.length) % tabBtns.length;
            } else if (e.key === 'Home') {
                e.preventDefault();
                newIndex = 0;
            } else if (e.key === 'End') {
                e.preventDefault();
                newIndex = tabBtns.length - 1;
            }

            if (newIndex !== currentIndex) {
                tabBtns[newIndex].focus();
                switchTab(tabBtns[newIndex].getAttribute('data-tab'));
            }
        });

    })();
    </script>

</body>
</html>
